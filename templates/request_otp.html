<!DOCTYPE html>
<html>

<head>
    <title>Forgot Password</title>
</head>

<body>

    <h2>Forgot Password</h2>

    <form method="POST">
        {% csrf_token %}
        <input type="email" name="email" placeholder="Enter email">
        <button type="submit">Send OTP</button>
    </form>

    {% if error %}
    <p style="color:red">{{ error }}</p>
    {% endif %}

</body>

</html>
