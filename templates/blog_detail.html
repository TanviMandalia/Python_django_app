<!DOCTYPE html>
<html>
<head>
    <title>{{ blog.title }}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f8f9fa;
            font-family: Georgia, 'Times New Roman', serif;
            color: #1a1a1a;
        }

        /* Hero section */
        .hero {
            height: 380px;
            background: #000;
            display: flex;
            align-items: end;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7;
            position: absolute;
        }

        .hero-content {
            position: relative;
            color: white;
            text-align: center;
            padding: 30px;
            max-width: 800px;
        }

        .hero-title {
            font-size: 42px;
            font-weight: bold;
        }

        .meta {
            font-size: 14px;
            opacity: 0.85;
            margin-top: 10px;
        }

        /* Article container */
        .article-container {
            max-width: 800px;
            margin: -60px auto 50px auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .article-content {
            font-size: 18px;
            line-height: 1.9;
            color: #333;
            white-space: pre-line;
        }

        /* Back button */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.9);
            padding: 8px 14px;
            border-radius: 20px;
            text-decoration: none;
            color: #000;
            font-size: 14px;
        }

        .back-btn:hover {
            background: white;
        }
    </style>
</head>

<body>

<!-- HERO -->
<div class="hero">

    {% if blog.image %}
        <img src="{{ blog.image.url }}" alt="">
    {% endif %}

    <a href="/blog/" class="back-btn">← Back</a>

    <div class="hero-content">
        <div class="hero-title">{{ blog.title }}</div>
        <div class="meta">
            Published on {{ blog.created_at|date:"F d, Y" }}
        </div>
    </div>
</div>

<!-- ARTICLE -->
<div class="article-container">

    <div class="article-content">
        {{ blog.content }}
    </div>

</div>

</body>
</html>
