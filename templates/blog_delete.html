<!DOCTYPE html>
<html>
<head>
    <title>Delete Blog</title>
</head>
<body>

    <h2>⚠️ Delete Blog</h2>

    <p>Are you sure you want to delete:</p>

    <h3>{{ blog.title }}</h3>

    <form method="POST" action="{% url 'admin_blog_delete' blog.id %}">
        {% csrf_token %}
        <button type="submit" style="color:red;">Yes, Delete</button>
        <a href="{% url 'admin_blog_list' %}">Cancel</a>
    </form>

</body>
</html>
